<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>litegpt</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      color: #1a1a1a;
      background: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #topbar {
      padding: 18px 32px 12px;
      font-size: 20px;
      font-weight: 600;
      color: #111;
      letter-spacing: 0.01em;
      flex-shrink: 0;
      user-select: none;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 24px;
      scroll-behavior: smooth;
    }

    .msg-row {
      display: flex;
      padding: 6px 32px;
      animation: appear .18s ease;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { justify-content: flex-end; }

    .msg-row.user .bubble {
      background: #efefef;
      color: #111;
      padding: 9px 14px;
      border-radius: 18px;
      max-width: 60%;
      line-height: 1.5;
      font-size: 14.5px;
    }

    .msg-row.ai { justify-content: flex-start; }

    .msg-row.ai .bubble {
      background: transparent;
      color: #1a1a1a;
      max-width: 70%;
      line-height: 1.75;
      font-size: 14.5px;
      white-space: pre-wrap;
      padding: 2px 0;
    }

    .typing-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      height: 20px;
    }

    .typing-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #aaa;
      animation: dot-bounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .5; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    .msg-row.error .bubble { color: #b00; font-size: 13.5px; }

    #inputbar {
      flex-shrink: 0;
      border-top: 1px solid #f0f0f0;
      padding: 14px 32px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .params {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .param-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #888;
    }

    .param-item label { white-space: nowrap; }

    .param-item input[type="number"] {
      width: 56px;
      padding: 3px 6px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      color: #333;
      outline: none;
      -moz-appearance: textfield;
    }
    .param-item input[type="number"]::-webkit-inner-spin-button { display: none; }
    .param-item input[type="number"]:focus { border-color: #aaa; }

    .param-item input[type="range"] {
      width: 80px;
      accent-color: #555;
      cursor: pointer;
    }

    .param-item .range-val {
      min-width: 28px;
      font-variant-numeric: tabular-nums;
      color: #555;
    }

    .compose {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #prompt {
      flex: 1;
      resize: none;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14.5px;
      color: #111;
      line-height: 1.5;
      outline: none;
      max-height: 140px;
      overflow-y: auto;
      transition: border-color .15s;
    }
    #prompt::placeholder { color: #bbb; }
    #prompt:focus { border-color: #bbb; }

    #send-btn {
      flex-shrink: 0;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 9px 18px;
      font-family: inherit;
      font-size: 13.5px;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      white-space: nowrap;
    }
    #send-btn:hover:not(:disabled) { background: #333; }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
  </style>
</head>
<body>

<div id="topbar">litegpt</div>
<div id="messages"></div>

<div id="inputbar">
  <div class="params">
    <div class="param-item">
      <label for="max-len">max length</label>
      <input type="number" id="max-len" value="200" min="10" max="1000"/>
    </div>
    <div class="param-item">
      <label for="temperature">temperature</label>
      <input type="range" id="temperature" min="0.1" max="2.0" step="0.05" value="0.8"/>
      <span class="range-val" id="temp-val">0.80</span>
    </div>
  </div>
  <div class="compose">
    <textarea id="prompt" rows="1" placeholder="Enter a phrase, and let Shakespeare continue it…"></textarea>
    <button id="send-btn">Generate</button>
  </div>
</div>

<script>
  const API = 'https://slssk-litegpt.hf.space/generate';

  const messagesEl = document.getElementById('messages');
  const promptEl   = document.getElementById('prompt');
  const sendBtn    = document.getElementById('send-btn');
  const maxLenEl   = document.getElementById('max-len');
  const tempEl     = document.getElementById('temperature');
  const tempValEl  = document.getElementById('temp-val');

  tempEl.addEventListener('input', () => {
    tempValEl.textContent = parseFloat(tempEl.value).toFixed(2);
  });

  promptEl.addEventListener('input', () => {
    promptEl.style.height = 'auto';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 140) + 'px';
  });

  promptEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener('click', send);

  function addMsg(role, text) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.id = 'typing-row';
    row.innerHTML = '<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function typeText(el, text, speed = 16) {
    el.textContent = '';
    let i = 0;
    (function tick() {
      if (i < text.length) {
        el.textContent += text[i++];
        messagesEl.scrollTop = messagesEl.scrollHeight;
        setTimeout(tick, text[i-1] === '\n' ? speed * 4 : speed);
      }
    })();
  }

  async function send() {
    const text = promptEl.value.trim();
    if (!text) return;

    addMsg('user', text);
    promptEl.value = '';
    promptEl.style.height = 'auto';
    sendBtn.disabled = true;

    const dotRow = addTyping();

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt: text,
          max_len: parseInt(maxLenEl.value) || 200,
          temperature: parseFloat(tempEl.value),
        }),
      });

      dotRow.remove();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Error ${res.status}`);
      }

      const data = await res.json();
      const output = (data.output || '').trim();
      const aiBubble = addMsg('ai', '');
      typeText(aiBubble, output);

    } catch (e) {
      dotRow.remove();
      addMsg('error', '⚠ ' + e.message);
    } finally {
      sendBtn.disabled = false;
      promptEl.focus();
    }
  }
</script>
</body>
</html>
